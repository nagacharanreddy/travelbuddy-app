<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelBuddy Finder</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Outfit', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); }
    .card-gradient { background: linear-gradient(145deg, rgba(30, 58, 95, 0.8), rgba(15, 23, 42, 0.9)); }
    .glow { box-shadow: 0 0 40px rgba(56, 189, 248, 0.15); }
    .match-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .match-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .nav-link { position: relative; }
    .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #38bdf8, #818cf8); transition: width 0.3s; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.5); }
    .btn-primary { background: linear-gradient(135deg, #38bdf8, #818cf8); transition: all 0.3s; }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3); }
    .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s; }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); border-color: rgba(56, 189, 248, 0.5); }
    .score-ring { background: conic-gradient(#38bdf8 calc(var(--score) * 3.6deg), rgba(255,255,255,0.1) 0); }
    .toast { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full gradient-bg text-white overflow-auto">
  <div id="app" class="min-h-full flex flex-col">
   <!-- Navigation -->
   <nav id="navbar" class="sticky top-0 z-50 backdrop-blur-xl bg-slate-900/80 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-4 py-3">
     <div class="flex items-center justify-between">
      <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
       <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
       </div><span id="nav-title" class="font-display text-xl font-bold bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">TravelBuddy</span>
      </div>
      <div class="hidden md:flex items-center gap-6" id="nav-links">
       <button onclick="navigateTo('home')" class="nav-link text-sm text-slate-300 hover:text-white transition" data-page="home">Home</button> <button onclick="navigateTo('find')" class="nav-link text-sm text-slate-300 hover:text-white transition" data-page="find">Find Traveller</button> <button onclick="navigateTo('groups')" class="nav-link text-sm text-slate-300 hover:text-white transition" data-page="groups">Groups</button> <button onclick="navigateTo('suggestions')" class="nav-link text-sm text-slate-300 hover:text-white transition" data-page="suggestions">AI Suggestions</button> <button onclick="navigateTo('planner')" class="nav-link text-sm text-slate-300 hover:text-white transition" data-page="planner">Planner</button> <button onclick="navigateTo('messages')" class="nav-link text-sm text-slate-300 hover:text-white transition" data-page="messages">Messages</button>
      </div>
      <div class="flex items-center gap-3" id="auth-buttons">
       <!-- Dynamic auth buttons -->
      </div><button class="md:hidden p-2" onclick="toggleMobileMenu()">
       <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
       </svg></button>
     </div><!-- Mobile Menu -->
     <div id="mobile-menu" class="hidden md:hidden mt-4 pb-4 border-t border-white/10 pt-4">
      <div class="flex flex-col gap-3">
       <button onclick="navigateTo('home')" class="text-left text-slate-300 hover:text-white py-2">Home</button> <button onclick="navigateTo('find')" class="text-left text-slate-300 hover:text-white py-2">Find Traveller</button> <button onclick="navigateTo('groups')" class="text-left text-slate-300 hover:text-white py-2">Groups</button> <button onclick="navigateTo('suggestions')" class="text-left text-slate-300 hover:text-white py-2">AI Suggestions</button> <button onclick="navigateTo('planner')" class="text-left text-slate-300 hover:text-white py-2">Planner</button> <button onclick="navigateTo('messages')" class="text-left text-slate-300 hover:text-white py-2">Messages</button>
      </div>
     </div>
    </div>
   </nav><!-- Toast Container -->
   <div id="toast-container" class="fixed top-20 right-4 z-50 flex flex-col gap-2"></div><!-- Main Content -->
   <main id="main-content" class="flex-1">
    <!-- Pages will be rendered here -->
   </main><!-- Footer -->
   <footer class="border-t border-white/10 py-6 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center text-slate-400 text-sm">
     <p>┬® 2024 TravelBuddy. Find your perfect travel companion.</p>
    </div>
   </footer>
  </div>
  <script>
    // ===== STATE MANAGEMENT =====
    let currentUser = null;
    let allUsers = [];
    let allGroups = [];
    let allRequests = [];
    let allMessages = [];
    let currentPage = 'home';
    let isLoading = false;
    let currentChatId = null;
    let aiPlaceDetails = null;
    let aiPlaceLoading = false;
    let aiTripPlan = null;
    let aiTripLoading = false;
    let plannerDestination = '';
    let destinationSearchInput = '';

    // ===== DEFAULT CONFIG =====
    const defaultConfig = {
      app_title: 'TravelBuddy',
      tagline: 'Find your perfect travel companion',
      primary_color: '#0f172a',
      secondary_color: '#1e3a5f',
      accent_color: '#38bdf8',
      text_color: '#f1f5f9',
      card_color: '#1e293b'
    };

    const destinationOptions = [
      'Goa, India',
      'Kerala Backwaters',
      'Munnar, Tamil Nadu',
      'Ooty, Tamil Nadu',
      'Coorg, Karnataka',
      'Pondicherry',
      'Hampi, Karnataka',
      'Mysore, Karnataka',
      'Madurai, Tamil Nadu'
    ];

    // ===== ELEMENT SDK INITIALIZATION =====
    const elementHandler = {
      defaultConfig,
      onConfigChange: async (config) => {
        const title = config.app_title || defaultConfig.app_title;
        const tagline = config.tagline || defaultConfig.tagline;
        
        const navTitle = document.getElementById('nav-title');
        if (navTitle) navTitle.textContent = title;
        
        const heroTitle = document.getElementById('hero-title');
        if (heroTitle) heroTitle.textContent = title;
        
        const heroTagline = document.getElementById('hero-tagline');
        if (heroTagline) heroTagline.textContent = tagline;
      },
      mapToCapabilities: (config) => ({
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['app_title', config.app_title || defaultConfig.app_title],
        ['tagline', config.tagline || defaultConfig.tagline]
      ])
    };

    if (window.elementSdk) {
      window.elementSdk.init(elementHandler);
    }

    // ===== DATA SDK INITIALIZATION =====
    const dataHandler = {
      onDataChanged: (data) => {
        allUsers = data.filter(d => d.type === 'user');
        allGroups = data.filter(d => d.type === 'group');
        allRequests = data.filter(d => d.type === 'request');
        allMessages = data.filter(d => d.type === 'message');
        
        // Check if current user still exists
        if (currentUser) {
          const updatedUser = allUsers.find(u => u.__backendId === currentUser.__backendId);
          if (updatedUser) {
            currentUser = updatedUser;
          }
        }
        
        updateAuthButtons();
        
        // Refresh current page if needed
        if (currentPage === 'find') renderFindPage();
        if (currentPage === 'groups') renderGroupsPage();
        if (currentPage === 'profile') renderProfilePage();
        if (currentPage === 'messages') renderMessagesPage();
      }
    };

    (async () => {
      if (window.dataSdk) {
        const result = await window.dataSdk.init(dataHandler);
        if (!result.isOk) {
          console.error('Failed to initialize Data SDK');
        }
      }
    })();

    // ===== UTILITY FUNCTIONS =====
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const bgColor = type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-red-500' : 'bg-sky-500';
      toast.className = `toast ${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2`;
      toast.innerHTML = `
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          ${type === 'success' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>' : 
            type === 'error' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>' :
            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'}
        </svg>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function setLoading(loading) {
      isLoading = loading;
    }

    function renderUserAvatar(user, className = 'w-12 h-12 rounded-full') {
      if (user?.profile_photo) {
        return `<img src="${user.profile_photo}" alt="${user.username}" class="${className} object-cover border border-white/10">`;
      }

      return `<div class="${className} bg-gradient-to-br from-sky-400 to-indigo-500 flex items-center justify-center text-lg font-bold">${user?.username?.charAt(0)?.toUpperCase() || '?'}</div>`;
    }

    function handleDestinationSearchInput(value) {
      destinationSearchInput = value;
      renderFindPage();
    }

    async function handleProfilePhotoUpload(e) {
      const file = e.target.files?.[0];
      if (!file || !currentUser) return;

      if (!file.type.startsWith('image/')) {
        showToast('Please choose an image file', 'error');
        return;
      }

      const reader = new FileReader();
      reader.onload = async () => {
        const updatedUser = { ...currentUser, profile_photo: reader.result };
        const result = await window.dataSdk.update(updatedUser);
        if (result.isOk) {
          currentUser = result.data || updatedUser;
          updateAuthButtons();
          showToast('Profile photo updated');
          renderProfilePage();
        } else {
          showToast('Failed to update profile photo', 'error');
        }
      };
      reader.readAsDataURL(file);
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    }

    function updateAuthButtons() {
      const container = document.getElementById('auth-buttons');
      if (currentUser) {
        container.innerHTML = `
          <button onclick="navigateTo('profile')" class="btn-secondary px-4 py-2 rounded-lg text-sm flex items-center gap-2">
            ${renderUserAvatar(currentUser, 'w-8 h-8 rounded-full')}
            <span class="hidden sm:inline">${currentUser.username}</span>
          </button>
          <button onclick="logout()" class="text-slate-400 hover:text-white text-sm">Logout</button>
        `;
      } else {
        container.innerHTML = `
          <button onclick="navigateTo('login')" class="btn-secondary px-4 py-2 rounded-lg text-sm">Login</button>
          <button onclick="navigateTo('signup')" class="btn-primary px-4 py-2 rounded-lg text-sm font-medium">Sign Up</button>
        `;
      }
    }

    function updateNavActive() {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active', 'text-white');
        if (link.dataset.page === currentPage) {
          link.classList.add('active', 'text-white');
        }
      });
    }

    // ===== NAVIGATION =====
    function navigateTo(page) {
      currentPage = page;
      updateNavActive();
      
      const main = document.getElementById('main-content');
      main.innerHTML = '<div class="flex items-center justify-center py-20"><div class="animate-spin w-8 h-8 border-2 border-sky-400 border-t-transparent rounded-full"></div></div>';
      
      setTimeout(() => {
        switch(page) {
          case 'home': renderHomePage(); break;
          case 'signup': renderSignupPage(); break;
          case 'login': renderLoginPage(); break;
          case 'preferences': renderPreferencesPage(); break;
          case 'find': renderFindPage(); break;
          case 'groups': renderGroupsPage(); break;
          case 'suggestions': renderSuggestionsPage(); break;
          case 'planner': renderPlannerPage(); break;
          case 'profile': renderProfilePage(); break;
          case 'messages': renderMessagesPage(); break;
          case 'chat': renderChatPage(); break;
          default: renderHomePage();
        }
      }, 200);
    }

    // ===== AUTH FUNCTIONS =====
    async function signup(e) {
      e.preventDefault();
      if (isLoading) return;
      
      const username = document.getElementById('signup-username').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      
      if (!username || !email || !password) {
        showToast('Please fill all fields', 'error');
        return;
      }
      
      if (allUsers.find(u => u.email === email)) {
        showToast('Email already registered', 'error');
        return;
      }
      
      if (allUsers.length >= 999) {
        showToast('Maximum users reached', 'error');
        return;
      }
      
      setLoading(true);
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<div class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full mx-auto"></div>';
      
      const result = await window.dataSdk.create({
        type: 'user',
        username,
        email,
        password,
        budget: '',
        travel_type: '',
        days: 0,
        season: 'any',
        destination_type: '',
        travel_mode: '',
        accommodation: '',
        gender_preference: 'any',
        group_name: '',
        group_members: '',
        group_owner: '',
        group_status: '',
        request_from: '',
        request_to: '',
        request_status: '',
        created_at: new Date().toISOString()
      });
      
      setLoading(false);
      btn.disabled = false;
      btn.textContent = 'Create Account';
      
      if (result.isOk) {
        currentUser = result.data;
        updateAuthButtons();
        showToast('Account created! Complete your preferences to continue.');
        navigateTo('preferences');
      } else {
        showToast('Failed to create account', 'error');
      }
    }

    async function login(e) {
      e.preventDefault();
      
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      
      const user = allUsers.find(u => u.email === email && u.password === password);
      
      if (user) {
        currentUser = user;
        updateAuthButtons();
        showToast(`Welcome back, ${user.username}!`);
        
        if (!user.budget) {
          navigateTo('preferences');
        } else {
          navigateTo('find');
        }
      } else {
        showToast('Invalid email or password', 'error');
      }
    }

    function logout() {
      currentUser = null;
      updateAuthButtons();
      showToast('Logged out successfully');
      navigateTo('home');
    }

    // ===== PREFERENCES =====
    async function savePreferences(e) {
      e.preventDefault();
      if (!currentUser || isLoading) return;
      
      const budget = document.getElementById('pref-budget').value;
      const travel_type = document.getElementById('pref-travel-type').value;
      const days = parseInt(document.getElementById('pref-days').value) || 0;
      const season = document.getElementById('pref-season').value;
      const destination_type = document.getElementById('pref-destination').value;
      const travel_mode = document.getElementById('pref-mode').value;
      const accommodation = document.getElementById('pref-accommodation').value;
      const gender_preference = document.getElementById('pref-gender').value;
      
      if (!budget || !travel_type || !days || !season || !destination_type || !travel_mode || !accommodation || !gender_preference) {
        showToast('Please fill all preferences', 'error');
        return;
      }
      
      setLoading(true);
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<div class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full mx-auto"></div>';
      
      const updatedUser = { ...currentUser, budget, travel_type, days, season, destination_type, travel_mode, accommodation, gender_preference };
      const result = await window.dataSdk.update(updatedUser);
      
      setLoading(false);
      btn.disabled = false;
      btn.textContent = 'Save Preferences';
      
      if (result.isOk) {
        currentUser = updatedUser;
        showToast('Preferences saved!');
        if (e.target.id === 'profile-pref-form') {
          renderProfilePage();
        } else {
          navigateTo('find');
        }
      } else {
        showToast('Failed to save preferences', 'error');
      }
    }

    // ===== MATCHING ALGORITHM =====
    function calculateMatchScore(user1, user2) {
      let score = 0;
      let maxScore = 6;
      
      // Budget match (0-1)
      if (user1.budget === user2.budget) score += 1;
      else if (
        (user1.budget === 'medium' && (user2.budget === 'low' || user2.budget === 'high')) ||
        (user2.budget === 'medium' && (user1.budget === 'low' || user1.budget === 'high'))
      ) score += 0.5;
      
      // Travel type match (0-1)
      if (user1.travel_type === user2.travel_type) score += 1;
      
      // Days match (0-1)
      const daysDiff = Math.abs(user1.days - user2.days);
      if (daysDiff === 0) score += 1;
      else if (daysDiff <= 2) score += 0.7;
      else if (daysDiff <= 5) score += 0.3;
      
      // Season match (0-1)
      if (user1.season === user2.season || user1.season === 'any' || user2.season === 'any') score += 1;
      
      // Destination type match (0-1)
      if (user1.destination_type === user2.destination_type) score += 1;
      
      // Gender preference match (0-1)
      const genderMatch = (user1.gender_preference === 'any' || user2.gender_preference === 'any' || 
                          (user1.gender_preference === 'male' && user2.gender_preference === 'male') ||
                          (user1.gender_preference === 'female' && user2.gender_preference === 'female'));
      if (genderMatch) score += 1;
      
      return Math.round((score / maxScore) * 100);
    }

    function findMatches() {
      if (!currentUser || !currentUser.budget) return [];
      
      const otherUsers = allUsers.filter(u => 
        u.__backendId !== currentUser.__backendId && u.budget
      );
      
      const matches = otherUsers.map(user => ({
        user,
        score: calculateMatchScore(currentUser, user),
        matchType: getMatchType(currentUser, user)
      }));
      
      return matches.sort((a, b) => b.score - a.score);
    }

    function getMatchType(user1, user2) {
      const mode1 = user1.travel_mode;
      const mode2 = user2.travel_mode;
      
      if (mode1 === 'solo' && mode2 === 'solo') return 'Solo + Solo';
      if (mode1 === 'solo' && mode2 === 'group') return 'Solo + Group';
      if (mode1 === 'group' && mode2 === 'solo') return 'Group + Solo';
      if (mode1 === 'group' && mode2 === 'group') return 'Group + Group';
      if (mode1 === 'join' || mode2 === 'join') return 'Join Group';
      return 'Mixed';
    }

    // ===== GROUP FUNCTIONS =====
    async function createGroup(e) {
      e.preventDefault();
      if (!currentUser || isLoading) return;
      
      const name = document.getElementById('group-name').value.trim();
      const destination = document.getElementById('group-dest').value.trim();
      
      if (!name || !destination) {
        showToast('Please enter group name and destination', 'error');
        return;
      }
      
      if (allGroups.length >= 999) {
        showToast('Maximum groups reached', 'error');
        return;
      }
      
      setLoading(true);
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<div class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full mx-auto"></div>';
      
      const result = await window.dataSdk.create({
        type: 'group',
        username: '',
        email: '',
        password: '',
        budget: currentUser.budget,
        travel_type: currentUser.travel_type,
        days: currentUser.days,
        season: currentUser.season,
        destination_type: currentUser.destination_type,
        travel_mode: '',
        group_name: name,
        group_destination: destination,
        group_members: currentUser.username,
        group_owner: currentUser.__backendId,
        group_status: 'open',
        request_from: '',
        request_to: '',
        request_status: '',
        created_at: new Date().toISOString()
      });
      
      setLoading(false);
      btn.disabled = false;
      btn.textContent = 'Create Group';
      
      if (result.isOk) {
        showToast('Group created!');
        document.getElementById('group-name').value = '';
        document.getElementById('group-dest').value = '';
        renderGroupsPage();
      } else {
        showToast('Failed to create group', 'error');
      }
    }

    async function joinGroup(groupId) {
      if (!currentUser || isLoading) return;
      
      const group = allGroups.find(g => g.__backendId === groupId);
      if (!group) return;
      
      // Check if already a member
      if (group.group_members?.includes(currentUser.username)) {
        showToast('Already a member of this group', 'info');
        return;
      }
      
      // Check if group is full
      if (group.group_size_current >= group.group_size_required) {
        showToast('Group is full', 'error');
        return;
      }
      
      setLoading(true);
      
      const members = group.group_members ? group.group_members.split(',') : [];
      if (!members.includes(currentUser.username)) {
        members.push(currentUser.username);
      }
      
      const result = await window.dataSdk.update({
        ...group,
        group_members: members.join(','),
        group_size_current: members.length
      });
      
      setLoading(false);
      
      if (result.isOk) {
        showToast('Request sent to group owner!');
      } else {
        showToast('Failed to join group', 'error');
      }
    }

    async function sendRequest(toUserId) {
      if (!currentUser || isLoading) return;
      
      const existingRequest = allRequests.find(r => 
        r.request_from === currentUser.__backendId && r.request_to === toUserId
      );
      
      if (existingRequest) {
        showToast('Request already sent', 'info');
        return;
      }

    async function handleRequest(requestId, accept) {
      if (!currentUser || isLoading) return;
      
      const request = allRequests.find(r => r.__backendId === requestId);
      if (!request) return;
      
      setLoading(true);
      
      const result = await window.dataSdk.update({
        ...request,
        request_status: accept ? 'accepted' : 'rejected'
      });
      
      setLoading(false);
      
      if (result.isOk) {
        showToast(accept ? 'Request accepted!' : 'Request declined');
      } else {
        showToast('Failed to update request', 'error');
      }
    }

    function generateDestinationDetailedPlan(destinationName, days) {
      const destInfo = getDetailedDestinationInfo(destinationName);
      if (!destInfo) return [];
      
      const spots = destInfo.tourist_spots || [];
      const activities = destInfo.activities || [];
      
      const plan = [];
      for (let i = 1; i <= days; i++) {
        let dayActivities = [];
        
        if (i === 1) {
          dayActivities = ['Arrive at destination', 'Check into hotel', 'Rest and freshen up', `Evening: ${activities[0] || 'Explore local area'}`];
        } else if (i === days) {
          dayActivities = ['Final exploration', 'Local market shopping', 'Souvenir hunting', 'Checkout and depart'];
        } else {
          const spotIndex = (i - 2) % spots.length;
          const actIndex = (i - 2) % activities.length;
          dayActivities = [
            `Visit: ${spots[spotIndex]}`,
            `Activity: ${activities[actIndex]}`,
            `Lunch at local restaurant`,
            `Evening exploration`
          ];
        }
        
        plan.push({
          day: i,
          title: `Day ${i} - ${destInfo.name}`,
          activities: dayActivities,
          spots: [spots[(i-1) % spots.length]],
          hotels: [destInfo.hotels[(i-1) % destInfo.hotels.length]]
        });
      }
      return plan;
    }

    function generateTravelPlan(destination, days) {
      const activities = {
        beach: ['Visit the beach', 'Snorkeling', 'Beach volleyball', 'Sunset cruise', 'Seafood dinner', 'Water sports', 'Island hopping'],
        hill: ['Mountain trek', 'Cable car ride', 'Visit viewpoint', 'Nature walk', 'Local market visit', 'Photography tour', 'Camping'],
        city: ['City tour', 'Museum visit', 'Local food tour', 'Shopping', 'Night market', 'Historical sites', 'Cultural show'],
        forest: ['Jungle safari', 'Bird watching', 'Nature trail', 'River rafting', 'Camping', 'Wildlife photography', 'Tribal village visit']
      };
      
      const type = currentUser?.destination_type || 'city';
      const typeActivities = activities[type] || activities.city;
      
      const plan = [];
      for (let i = 1; i <= days; i++) {
        if (i === 1) {
          plan.push({ day: i, title: 'Arrival Day', activities: ['Arrive at destination', 'Check into hotel', 'Rest and freshen up', 'Evening exploration'] });
        } else if (i === days) {
          plan.push({ day: i, title: 'Departure Day', activities: ['Pack and checkout', 'Last minute shopping', 'Head to airport/station', 'Return journey'] });
        } else {
          const dayActivities = [];
          for (let j = 0; j < 4; j++) {
            dayActivities.push(typeActivities[(i + j) % typeActivities.length]);
          }
          plan.push({ day: i, title: `Day ${i} - Exploration`, activities: dayActivities });
        }
      }
      return plan;
    }

    async function updateDestination(destination) {
      if (!currentUser || isLoading) return;
      destinationSearchInput = destination;
      
      setLoading(true);
      const updatedUser = { ...currentUser, selected_destination: destination };
      const result = await window.dataSdk.update(updatedUser);
      setLoading(false);
      
      if (result.isOk) {
        currentUser = updatedUser;
        renderFindPage();
      } else {
        showToast('Failed to update destination', 'error');
      }
    }

    async function createGroup(e) {
      e.preventDefault();
      if (!currentUser || isLoading) return;
      
      const name = document.getElementById('group-name').value.trim();
      const destination = document.getElementById('group-dest').value.trim();
      const groupSize = parseInt(document.getElementById('group-size').value) || 0;
      
      if (!name || !destination || !groupSize) {
        showToast('Please fill all fields', 'error');
        return;
      }
      
      if (allGroups.length >= 999) {
        showToast('Maximum groups reached', 'error');
        return;
      }
      
      setLoading(true);
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<div class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full mx-auto"></div>';
      
      const result = await window.dataSdk.create({
        type: 'group',
        username: '',
        email: '',
        password: '',
        budget: currentUser.budget,
        travel_type: currentUser.travel_type,
        days: currentUser.days,
        season: currentUser.season,
        destination_type: currentUser.destination_type,
        travel_mode: '',
        accommodation: '',
        gender_preference: '',
        group_name: name,
        group_destination: destination,
        group_members: currentUser.username,
        group_owner: currentUser.__backendId,
        group_size_required: groupSize,
        group_size_current: 1,
        group_status: 'open',
        request_from: '',
        request_to: '',
        request_status: '',
        created_at: new Date().toISOString()
      });
      
      setLoading(false);
      btn.disabled = false;
      btn.textContent = 'Create Group';
      
      if (result.isOk) {
        showToast('Group created!');
        document.getElementById('group-name').value = '';
        document.getElementById('group-dest').value = '';
        document.getElementById('group-size').value = '';

        async function handleAIDestinationSearch(e) {
      e.preventDefault();
      if (aiPlaceLoading) return;

      const input = document.getElementById('ai-place-search');
      const place = input?.value?.trim();
      if (!place) {
        showToast('Enter a place name first', 'error');
        return;
      }

      await loadAIDestinationDetail(place);
    }

    async function loadAIDestinationDetail(place) {
      if (aiPlaceLoading) return;
      aiPlaceLoading = true;
      renderSuggestionsPage();

      try {
        const response = await fetch('/api/ai/place-details', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ place })
        });
        const result = await response.json();
        if (!response.ok || !result.isOk) {
          throw new Error(result.error || 'Failed to get AI details');
        }
        aiPlaceDetails = result.data;
        showToast(`AI guide ready for ${result.data.name || place}`);
      } catch (error) {
        aiPlaceDetails = { error: error.message || 'Failed to get AI details.', place_query: place };
        showToast(aiPlaceDetails.error, 'error');
      } finally {
        aiPlaceLoading = false;
        renderSuggestionsPage();
      }
    }

    function startAITripPlanning(place) {
      plannerDestination = place;
      aiTripPlan = null;
      navigateTo('planner');
    }

    async function requestAITripPlan(place, days) {
      if (aiTripLoading) return;
      aiTripLoading = true;
      renderPlannerPage();

      try {
        const response = await fetch('/api/ai/trip-plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ place, days })
        });
        const result = await response.json();
        if (!response.ok || !result.isOk) {
          throw new Error(result.error || 'Failed to generate AI trip plan');
        }
        aiTripPlan = result.data;
        plannerDestination = result.data.place || place;
        showToast(`Trip plan ready for ${plannerDestination}`);
      } catch (error) {
        aiTripPlan = { error: error.message || 'Failed to generate AI trip plan.', place_query: place, trip_length: days };
        showToast(aiTripPlan.error, 'error');
      } finally {
        aiTripLoading = false;
        renderPlannerPage();
      }
    }
